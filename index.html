<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Finanças</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="toast-container" class="toast-container"></div>

    <main id="app-screen" class="app-container">
        
        <header class="app-header">
            <div class="header-user-info">
                <div>
                    <h1>Minhas Finanças</h1>
                    <span class="couple-token">Dados salvos localmente</span>
                </div>
            </div>
        </header>

        <div class="month-navigator">
            <button id="prev-month-btn">◀</button>
            <span id="current-month-label">Maio de 2026</span>
            <button id="next-month-btn">▶</button>
        </div>

        <div class="content-wrapper">
            <section id="view-dashboard" class="spa-view">
                <div class="balance-card">
                    <span class="balance-label">Meu Saldo</span>
                    <h2 id="dash-total-balance" class="balance-amount">R$ 0,00</h2>
                    <div class="balance-actions">
                        <button class="btn-action-trigger trigger-out" data-type="saida">＋ Adicionar Saída</button>
                        <button class="btn-action-trigger trigger-in" data-type="entrada">＋ Adicionar Entrada</button>
                    </div>
                </div>
                <div class="section-container">
                    <h3 class="section-title">Transações Recentes</h3>
                    <div id="dash-goals-widget" class="goals-widget-card">
                        <span class="widget-meta-title">Meta Atual</span>
                        <div class="goal-progress-row">
                            <span id="lbl-widget-goal-name">Nenhuma meta</span>
                            <span id="lbl-widget-goal-percent">0%</span>
                        </div>
                        <div class="goal-progress-bar-bg">
                            <div id="bar-widget-goal-fill" class="goal-progress-bar-fill" style="width: 0%;"></div>
                        </div>
                    </div>
                    <div id="dash-recent-list" class="transactions-list"></div>
                </div>
            </section>

            </div>

        <nav class="bottom-nav">
            <button class="nav-item active" data-view="dashboard"><span class="nav-icon">🏠</span><span>Home</span></button>
            <button class="nav-item" data-view="transactions"><span class="nav-icon">📊</span><span>Histórico</span></button>
            <button class="nav-item" id="nav-direct-plus-btn"><span class="nav-icon icon-plus-center">＋</span><span>Plus</span></button>
            <button class="nav-item" data-view="goals"><span class="nav-icon">🎯</span><span>Metas</span></button>
        </nav>
    </main>

    <script src="app.js"></script>
</body>
</html>
